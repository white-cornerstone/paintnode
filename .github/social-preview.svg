    </filter>
    <filter id="node-shadow" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="0" dy="13" stdDeviation="14" flood-color="#16042a" flood-opacity="0.44"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 520c180-72 338-84 512-28 213 69 386 58 768-103v251H0z" fill="#47d3c2" opacity="0.12"/>
  <path d="M0 94c185 52 348 47 490-15 154-67 336-85 541-20 90 29 173 43 249 39V0H0z" fill="#ff6bd6" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="86" y="88" width="430" height="430" rx="96" fill="url(#panel)"/>
    <path d="M118 404c77-42 144-61 212-56 67 5 109 32 171-2" fill="none" stroke="url(#stroke-a)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M119 346c66-37 129-55 203-49 72 6 113 30 178 0" fill="none" stroke="url(#stroke-b)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>
    <path d="M332 181l50 79 74-28" fill="none" stroke="#ffe6ff" stroke-width="21" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>
