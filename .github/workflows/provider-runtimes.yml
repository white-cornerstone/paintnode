name: Provider runtimes

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: PaintNode provider package version
        required: true
        default: "5.0.0"
      codex_sdk_version:
        description: Codex SDK version
        required: true
        default: "0.144.0"
      claude_sdk_version:
        description: Claude Agent SDK version
        required: true
        default: "0.3.205"
      runtime_release_tag:
        description: Isolated release tag; production requires explicit confirmation
        required: true
        default: "provider-runtimes-creative-blueprint"
      confirm_production_publish:
        description: Confirm replacing the production provider runtime channel
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: "22.19.0"
  RUNTIME_RELEASE_TAG: ${{ inputs.runtime_release_tag }}

jobs:
  release-target:
    runs-on: ubuntu-latest
    steps:
      - name: Protect production runtime channel
        env:
          CONFIRM_PRODUCTION_PUBLISH: ${{ inputs.confirm_production_publish }}
        run: |
          set -euo pipefail
          if [[ ! "$RUNTIME_RELEASE_TAG" =~ ^provider-runtimes-[a-z0-9-]+$ ]]; then
            echo "Runtime release tag is invalid: $RUNTIME_RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$RUNTIME_RELEASE_TAG" == "provider-runtimes-latest" && "$CONFIRM_PRODUCTION_PUBLISH" != "true" ]]; then
            echo "Production runtime publication requires explicit confirmation." >&2
            exit 1
          fi

  build:
    needs: release-target
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        provider: [codex, claude]
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Download target Node runtime
        shell: bash
        run: |
          curl -fsSLO "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-${{ matrix.arch }}.tar.gz"
          tar -xzf "node-v${NODE_VERSION}-darwin-${{ matrix.arch }}.tar.gz"
      - name: Build managed provider package
        shell: bash
        run: |
          if [[ "${{ matrix.provider }}" == "codex" ]]; then
            sdk="${{ inputs.codex_sdk_version }}"
          else
            sdk="${{ inputs.claude_sdk_version }}"
          fi
          node scripts/build-managed-runtime.mjs \
            --provider "${{ matrix.provider }}" \
            --sdk-version "$sdk" \
            --package-version "${{ inputs.package_version }}" \
            --platform darwin \
            --arch "${{ matrix.arch }}" \
            --node "$PWD/node-v${NODE_VERSION}-darwin-${{ matrix.arch }}/bin/node"
      - uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.provider }}-${{ matrix.arch }}
          path: dist/managed-runtimes/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          pattern: runtime-*
          path: dist/managed-runtimes
          merge-multiple: true
      - name: Generate update manifest
        run: node scripts/generate-runtime-manifest.mjs dist/managed-runtimes
      - name: Publish independently updateable provider packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RUNTIME_RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RUNTIME_RELEASE_TAG" \
              dist/managed-runtimes/*.zip \
              dist/managed-runtimes/runtime-manifest.json \
              --clobber
            gh release edit "$RUNTIME_RELEASE_TAG" \
              --title "PaintNode provider runtimes" \
              --prerelease
          else
            gh release create "$RUNTIME_RELEASE_TAG" \
              dist/managed-runtimes/*.zip \
              dist/managed-runtimes/runtime-manifest.json \
              --title "PaintNode provider runtimes" \
              --prerelease \
              --notes "Independently updateable managed Codex and Claude provider runtimes."
          fi
